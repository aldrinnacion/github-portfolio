<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#0f172a;
    color:white;
}

header{
    background:#1e293b;
    padding:20px;
    text-align:center;
}

section{
    padding:40px;
    max-width:900px;
    margin:auto;
}

.projects{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
}

footer{
    text-align:center;
    padding:20px;
    background:#1e293b;
}
</style>

</head>

<body>

<header>
<h1>My GitHub Portfolio</h1>
<p>Welcome to my personal website</p>
</header>

<section>
<h2>About Me</h2>
<p>Hello! I'm learning web development and building projects on GitHub.</p>
</section>

<section>
<h2>Projects</h2>

<div class="projects">

<div class="card">
<h3>Project 1</h3>
<p>My first project.</p>
</div>

<div class="card">
<h3>Project 2</h3>
<p>Another cool project.</p>
</div>

<div class="card">
<h3>Project 3</h3>
<p>More coming soon.</p>
</div>

</div>
</section>

<footer>
<p>© 2026 My Portfolio</p>
</footer>

</body>
</html>
